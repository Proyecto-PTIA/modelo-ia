name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar tu repo de GitHub
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Configurar Git
      - name: Setup Git
        run: |
          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global user.name "github-actions"

      # 3. Clonar tu Space de Hugging Face
      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://escorpionfake:${HF_TOKEN}@huggingface.co/spaces/escorpionfake/modelo-ia-recetas space

      # 4. Sincronizar archivos
      - name: Sync files
        run: |
          rsync -av --exclude=".git" ./ space/

      # 5. Commit y push al Space
      - name: Push to Hugging Face
        run: |
          cd space
          git add .
          git commit -m "🚀 Auto deploy from GitHub" || echo "No changes"
          git push