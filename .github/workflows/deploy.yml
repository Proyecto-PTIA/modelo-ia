name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configurar identidad del usuario
          git config --global user.email "paco.andres03@gmail.com"
          git config --global user.name "Oscar Andrés Sánchez"
          
          # 2. Inicializar Git LFS
          git lfs install
          
          # 3. Clonar el Space de Hugging Face
          # Usamos un clon limpio en la carpeta 'target_space' para evitar confusiones
          git clone https://huggingface.co/spaces/escorpionfake/modelo-ia-recetas target_space
          
          # 4. Sincronizar archivos del repo al Space (excluyendo carpetas de git y la temporal)
          rsync -av --exclude=".git" --exclude="target_space" --exclude=".github" ./ target_space/
          
          # 5. Entrar a la carpeta del Space para gestionar el envío
          cd target_space
          
          # 6. Asegurar que los archivos pesados sigan rastreados por LFS en el destino
          git lfs track "*.keras"
          git lfs track "*.h5"
          git add .gitattributes
          
          # 7. Añadir todos los archivos sincronizados
          git add .
          
          # 8. Commit y Push con Force para actualizar el Space
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto deploy: S.I.R.I. API via GitHub Actions"
            git push https://escorpionfake:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/escorpionfake/modelo-ia-recetas main --force
          else
            echo "No se detectaron cambios para desplegar."
          fi